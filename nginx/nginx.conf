# Reverse proxy Nginx — route le frontend et l'API sous un même domaine.
#
# Résolution DNS dynamique (127.0.0.11 = DNS embarqué Docker) : évite l'erreur
# « host not found in upstream » lorsque Nginx démarre avant le backend.
#
# Développement : HTTP sur le port 80 (aucun certificat requis).
# Production TLS : décommenter le bloc HTTPS ci-dessous et monter les certificats
# dans ./nginx/certs/ (fullchain.pem + privkey.pem).

resolver 127.0.0.11 valid=10s ipv6=off;

# --- HTTP (développement / réseau local) ---
server {
  listen 80;
  server_name _;

  client_max_body_size 5m;

  location /api/ {
    set $backend_upstream backend:3001;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /health {
    set $backend_upstream backend:3001;
    proxy_pass http://$backend_upstream/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    set $frontend_upstream frontend:3000;
    proxy_pass http://$frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

