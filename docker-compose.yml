services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-incident_entry}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-incident_entry}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_net

  # Relais TCP vers Alfresco quand l'instance n'est pas joignable depuis le
  # réseau bridge Docker (ex. VM libvirt sur virbr0). Démarrer avec :
  #   docker compose --profile alfresco-proxy up -d
  alfresco-proxy:
    image: alpine/socat:1.8.0.0
    network_mode: host
    restart: unless-stopped
    command:
      - TCP-LISTEN:${ALFRESCO_PROXY_LISTEN_PORT:-8081},fork,reuseaddr
      - TCP:${ALFRESCO_UPSTREAM_HOST:?ALFRESCO_UPSTREAM_HOST requis avec le profil alfresco-proxy}:${ALFRESCO_UPSTREAM_PORT:-8080}
    profiles:
      - alfresco-proxy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-incident_entry}
      ALFRESCO_BASE_URL: ${ALFRESCO_BASE_URL:?ALFRESCO_BASE_URL est requis}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY est requis — openssl rand -hex 32}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-app_session}
      SESSION_DURATION_HOURS: ${SESSION_DURATION_HOURS:-8}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN est requis}
    volumes:
      - backend_storage:/app/apps/backend/storage/generated-documents
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:3001/health\",(r)=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - app_net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_BASE_PATH: ${APP_BASE_PATH:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:3001
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:3000\",(r)=>{process.exit(r.statusCode<500?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      # 0.0.0.0:80 — accessible depuis les autres machines du réseau (ex: Nginx archivage sur .208)
      - '0.0.0.0:${NGINX_HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

volumes:
  db_data:
  backend_storage:

networks:
  app_net:
    driver: bridge
